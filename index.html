<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Sign In</title>
<link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
    --bg: rgba(255,240,230,0.8);           
    --card: rgba(255,240,230,0.85);        
    --accent-600: #800000;                 
    --muted: #4a1a1a;                      
    --soft-border: rgba(88,64,45,0.14);
    --shadow: 0 18px 40px rgba(30,35,40,0.09);
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: url('2.png') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding-top: 70px;
    margin: 0;
}

.box {
    background: var(--card);
    padding: 40px;
    border-radius: 16px;
    width: 340px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(30,35,40,0.12), 0 0 0 1px var(--soft-border);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.box:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 50px rgba(30,35,40,0.15), 0 0 0 1px var(--soft-border);
}

.box h2 {
    color: var(--accent-600);
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 30px;
    margin-top: 0;
    letter-spacing: -0.5px;
}

input {
    width: 100%;
    padding: 12px 14px;
    margin: 12px 0;
    border: 1.5px solid var(--soft-border);
    border-radius: 8px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    color: var(--muted);
    background-color: #fafafa;
    box-sizing: border-box;
    transition: all 0.2s ease;
}

input::placeholder {
    color: #999;
}

input:focus {
    outline: none;
    border-color: var(--accent-600);
    background-color: #fff;
    box-shadow: 0 0 0 3px rgba(212,162,74,0.1);
}

button {
    width: 100%;
    padding: 12px 20px;
    margin-top: 18px;
    background-color: var(--accent-600);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 700;
    font-size: 15px;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

button:hover {
    background-color: #8f6a1f;
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(173,128,48,0.3);
}

button:active {
    transform: translateY(0);
}
.navbar {
    background: var(--card) !important;
    border-bottom: 1px solid var(--soft-border);
    box-shadow: var(--shadow);
    padding: 0.5rem 1rem;
}

.navbar {
    margin-bottom: 0;
}
    .navbar-brand {
    color: var(--accent-600) !important;
    font-weight: 700;
    font-size: 1.25rem;
}
    .navbar-nav .nav-link {
    color: var(--muted) !important;
    font-weight: 500;
    padding: 0.5rem 1rem;
}
    .navbar-nav .nav-link:hover,
    .navbar-nav .nav-link:focus {
    color: var(--accent-600) !important;
    background: rgba(212,162,74,0.1);
    border-radius: 0.25rem;
}
    .navbar-toggler {
    border-color: var(--soft-border);
}
    .navbar-toggler-icon {
    filter: invert(20%);
}

p#message {
    margin-top: 18px;
    font-weight: 500;
    font-size: 14px;
    min-height: 20px;
    animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}
</style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">OBMC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Sign in</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="project2ndpage.html">Team Checker</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="projectPage3.html">Team Players</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<div class="box">
    <h2>Sign In</h2>

    <input type="text" id="username" placeholder="Enter Username"><br>
    <input type="password" id="password" placeholder="Enter Password"><br>
    <button onclick="login()">Login</button>

    <p id="message"></p>
</div>
<!-- I got this from my last year 3rd quarter project -->
<script>
function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const message = document.getElementById("message");

    if (username === "") {
        message.textContent = "Username is required";
        message.style.color = "red";
    } 
    else if (password.length < 6) {
        message.textContent = "Password must be at least 6 characters";
        message.style.color = "red";
    } 
    else if (!/\d/.test(password)) {
        message.textContent = "Password must contain a number";
        message.style.color = "red";
    } 
    else {
        message.textContent = "Login Successful ✅";
        message.style.color = "green";
    }
}
</script>
<!-- Bootstrap JS (for navbar toggler) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
