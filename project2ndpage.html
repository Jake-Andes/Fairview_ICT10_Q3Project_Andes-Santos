<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Intramurals — OBMC</title>

    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root{
          
            --bg: rgba(255,240,230,0.8);              
            --card: rgba(255,240,230,0.85);            
            --accent: #b22222;         
            --accent-600: #800000;     
            --muted: #4a1a1a;          
            --soft-border: rgba(88,64,45,0.14);
            --shadow: 0 18px 40px rgba(30,35,40,0.09);
            --success: #2f8f5a;
            --input-bg: #fffaf6;
        }

        html,body{height:100%; margin:0}
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('bg1.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--muted);
            -webkit-font-smoothing:antialiased;
            padding: 48px 20px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card-center{
            width:100%;
            max-width:600px;
            border-radius:14px;
            box-shadow: var(--shadow);
            border:1px solid var(--soft-border);
            overflow:hidden;
            transform-origin:top center;
            transition:transform .25s ease, box-shadow .25s ease;
        }

        .card-center:hover{transform:translateY(-4px);box-shadow:0 30px 80px rgba(30,35,40,0.12)}

        .card-header{
            display:flex;
            align-items:center;
            gap:14px;
            padding:20px 26px;
            background:linear-gradient(90deg, rgba(212,162,74,0.12), rgba(212,162,74,0.02));
        }
        .brand {
            width:56px;
            height:56px;
            border-radius:10px;
            background:linear-gradient(135deg,#fff0d9,#f2d19a);
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:800;
            color:#6b4322;
            box-shadow: 0 8px 24px rgba(30,35,40,0.06);
            border:1px solid rgba(0,0,0,0.04);
        }
        .title-wrap { flex:1; }
        .card-title {
            margin:0;
            font-size:22px;
            color: var(--accent-600);
            font-weight:700;
        }
        .card-sub { margin:4px 0 0; font-size:13px; color:var(--muted); }

        .card-body {
            padding:26px;
        }

        .grid {
            display:grid;
            grid-template-columns: 1fr 1fr;
            gap:18px;
        }

     
        .choice {
            background:#fff8f2;
            border-radius:12px;
            border:1px solid rgba(120,90,60,0.06);
            padding:14px;
            text-align:center;
            transition:box-shadow .18s ease, transform .18s ease;
        }
        .choice:hover{box-shadow:0 10px 28px rgba(30,35,40,0.05);transform:translateY(-2px)}
        .choice label { display:inline-flex; gap:8px; align-items:center; cursor:pointer; color:var(--muted); font-weight:700; }
        .choice input { transform:scale(1.03); accent-color: var(--accent-600); }

        
        .select-wrap {
            display:flex;
            flex-direction:column;
            gap:12px;
        }
        select.form-control {
            border-radius:10px;
            padding:10px 12px;
            border:1px solid rgba(120,90,60,0.12);
            height:48px;
            background:var(--input-bg);
            color:#2e2e2e;
            text-align:center;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
            transition:box-shadow .18s ease, border-color .18s ease;
        }
        select.form-control:focus{outline:none;border-color:var(--accent-600);box-shadow:0 6px 20px rgba(173,128,48,0.08)}

        .actions { display:flex; gap:12px; align-items:center; justify-content:center; margin-top:18px; flex-wrap:wrap; }
        .btn-gold {
            background:var(--accent-600);
            color:#fff;
            border:0;
            padding:12px 22px;
            border-radius:10px;
            font-weight:800;
            box-shadow:0 12px 30px rgba(173,128,48,0.12);
            transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
        }
        .btn-gold:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(173,128,48,0.18)}
        .btn-gold:active { transform:translateY(0); }
        .btn-clear {
            background:transparent;
            border:1px solid rgba(120,90,60,0.08);
            padding:10px 18px;
            border-radius:10px;
            color:var(--muted);
        }

        .card-footer {
            padding:18px 26px;
            border-top:1px solid rgba(120,90,60,0.06);
            background: linear-gradient(180deg, rgba(250,246,240,0.9), transparent);
        }

        #output1 {
            display:flex;
            gap:18px;
            align-items:flex-start;
            justify-content:flex-start;
            flex-wrap:wrap;
        }

        #output1 .result-card{
            background:#fff;
            border-radius:12px;
            border:1px solid rgba(120,90,60,0.06);
            padding:12px;
            display:flex;
            gap:12px;
            align-items:center;
            min-width:280px;
            box-shadow:0 8px 22px rgba(30,35,40,0.04);
        }

        #output1 .team-img {
            width:120px;
            height:80px;
            object-fit:cover;
            border-radius:8px;
            border:1px solid rgba(34,41,47,0.06);
            background:#f6f6f6;
        }

        #output1 .text {
            min-width:160px;
        }
        #output1 .text h4 {
            margin:0 0 6px 0;
            color:#52351f;
            font-size:15px;
        }
        #output1 .text p { margin:0; color:var(--muted); font-size:13px; }

        @media (max-width:800px){
            .grid { grid-template-columns: 1fr; }
            .card-body { padding:18px; }
            .card-header { padding:14px 18px; gap:10px; }
        }

        body {
            padding-top: 70px; 
        }
        .navbar {
            background: var(--card) !important;
            border-bottom: 1px solid var(--soft-border);
            box-shadow: var(--shadow);
            padding: 0.5rem 1rem;
        }
        .navbar-brand {
            color: var(--accent-600) !important;
            font-weight: 700;
            font-size: 1.25rem;
        }
        .navbar-nav .nav-link {
            color: var(--muted) !important;
            font-weight: 500;
            padding: 0.5rem 1rem;
        }
        .navbar-nav .nav-link:hover,
        .navbar-nav .nav-link:focus {
            color: var(--accent-600) !important;
            background: rgba(212,162,74,0.1);
            border-radius: 0.25rem;
        }
        .navbar-toggler {
            border-color: var(--soft-border);
        }
        .navbar-toggler-icon {
            filter: invert(20%);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">OBMC</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">Sign in</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="project2ndpage.html">Team Checker</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="projectPage3.html">Team Players</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="card-center">
        <div class="card-header">
            <div class="title-wrap">
                <h3 class="card-title">Intramurals Team Checker</h3>
                <div class="card-sub">Quickly check eligibility and assigned team</div>
            </div>
        </div>

        <div class="card-body">
            <form>
                <div class="grid">
                    <div>
                        <div class="choice mb-3">
                            <div style="font-weight:700;color:#5b4127;margin-bottom:8px;">Clinic Slip</div>
                            <label><input type="radio" id="clinic-yes" name="clinic" value="yes" checked> Yes</label>
                            <label style="margin-left:12px;"><input type="radio" id="clinic-no" name="clinic" value="no"> No</label>
                        </div>

                        <div class="choice">
                            <div style="font-weight:700;color:#5b4127;margin-bottom:8px;">Online Registration</div>
                            <label><input type="radio" id="online-yes" name="online" value="yes" checked> Yes</label>
                            <label style="margin-left:12px;"><input type="radio" id="online-no" name="online" value="no"> No</label>
                        </div>
                    </div>

                    <div class="select-wrap">
                        <div>
                            <label style="display:block;margin-bottom:8px;color:#5b4127;font-weight:700;">Grade level</label>
                            <select id="num1" class="form-control" aria-label="Grade level">
                                <option value="" disabled selected>Select Grade level</option>
                                <option value="7">Grade 7</option>
                                <option value="8">Grade 8</option>
                                <option value="9">Grade 9</option>
                                <option value="10">Grade 10</option>
                            </select>
                        </div>

                        <div>
                            <label style="display:block;margin-bottom:8px;color:#5b4127;font-weight:700;">Section</label>
                            <select id="num2" class="form-control" aria-label="Section">
                                <option value="" disabled selected>Select Section</option>
                                <option value="Ruby">Ruby</option>
                                <option value="Sapphire">Sapphire</option>
                                <option value="Emerald">Emerald</option>
                                <option value="Topaz">Topaz</option>
                                <option value="Jade">Jade</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="actions">
                    <button type="button" py-click="adding_numbers" class="btn btn-gold">Check</button>
                    <button type="button" class="btn btn-clear" onclick="document.getElementById('output1').innerHTML='';">Clear</button>
                </div>
            </form>
        </div>

        <div class="card-footer">
            <div id="output1"></div>
        </div>
    </div>

    <script type="py" src="project2ndpage.py"></script>
</body>
</html>
